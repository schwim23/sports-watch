name: Feature request
description: Suggest a new capability
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain are you trying to solve?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: dropdown
    id: league
    attributes:
      label: Affected league(s)
      multiple: true
      options: [MLB, NFL, NBA, NHL, all]
