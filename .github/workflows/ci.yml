name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready" --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/test
      AUTH_SECRET: ci-secret-not-real
      AUTH_GOOGLE_ID: ci
      AUTH_GOOGLE_SECRET: ci
      VAPID_PUBLIC_KEY: BPpvAjUx9fcG... # placeholder
      VAPID_PRIVATE_KEY: placeholder
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: BPpvAjUx9fcG...
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm prisma migrate deploy || pnpm prisma db push
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:unit
      - run: pnpm test:integration
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ""
